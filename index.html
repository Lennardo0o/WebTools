  <title>Start - Menu</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      margin: 20px 0;
      font-size: 28px;
      text-align: center;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .category {
      margin-bottom: 40px;
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    .category h2 {
      margin-bottom: 15px;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      background-color: #dbdbdb;
      color: #505964;
      border: none;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    button:hover {
      background-color: #cfcfcf;
    }

    .responsive-grid {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* Desktop Styles */
    @media (min-width: 768px) {
      .button-container {
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        max-width: none;
        width: 200px;
      }

      .responsive-grid {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-start;
        gap: 60px;
      }

      .category {
        flex: 1 1 300px;
        max-width: 300px;
      }
    }
  </style>
</head>
